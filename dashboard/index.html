<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XAUUSD ICT Sentinel Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0b1020; color: #e7ecff; }
    .wrap { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .card { background: #111831; border-radius: 16px; padding: 18px; box-shadow: 0 8px 24px rgba(0,0,0,.25); }
    h1, h2 { margin-top: 0; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid #263356; text-align: left; }
    .section { margin-top: 24px; }
    .ok { color: #7ee787; }
    .bad { color: #ff7b72; }
    .muted { color: #9fb0d1; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>XAUUSD ICT Sentinel Dashboard</h1>
    <div class="grid" id="summary"></div>

    <div class="section card">
      <h2>Model Performance</h2>
      <table>
        <thead><tr><th>Model</th><th>Total</th><th>Win</th><th>Loss</th><th>Pending</th><th>Win Rate</th><th>Avg Score</th><th>Avg Confidence</th></tr></thead>
        <tbody id="models"></tbody>
      </table>
    </div>

    <div class="section card">
      <h2>Session Performance</h2>
      <table>
        <thead><tr><th>Session</th><th>Total</th><th>Win</th><th>Loss</th><th>Win Rate</th></tr></thead>
        <tbody id="sessions"></tbody>
      </table>
    </div>

    <div class="section card">
      <h2>Trade History</h2>
      <table>
        <thead><tr><th>Created</th><th>Grade</th><th>Model</th><th>Session</th><th>Entry</th><th>SL</th><th>TP1</th><th>TP2</th><th>Result</th><th>Score</th><th>Confidence</th></tr></thead>
        <tbody id="trades"></tbody>
      </table>
    </div>
  </div>

  <script>
    async function load() {
      const res = await fetch('/dashboard-data');
      const data = await res.json();
      const summary = document.getElementById('summary');
      summary.innerHTML = [
        ['Total Trades', data.totalTrades],
        ['Resolved Trades', data.resolvedTrades],
        ['Wins', data.wins],
        ['Losses', data.losses],
        ['Pending', data.pending],
        ['Win Rate', `${data.winRate}%`]
      ].map(([k, v]) => `<div class="card"><div class="muted">${k}</div><div style="font-size:28px;font-weight:bold;margin-top:8px">${v}</div></div>`).join('');

      document.getElementById('models').innerHTML = (data.modelPerformance || []).map(row => `
        <tr>
          <td>${row.model}</td>
          <td>${row.total}</td>
          <td class="ok">${row.win}</td>
          <td class="bad">${row.loss}</td>
          <td>${row.pending}</td>
          <td>${row.winRate}%</td>
          <td>${row.avgScore}</td>
          <td>${row.avgConfidence}</td>
        </tr>`).join('');

      document.getElementById('sessions').innerHTML = (data.sessionPerformance || []).map(row => `
        <tr>
          <td>${row.session}</td>
          <td>${row.total}</td>
          <td class="ok">${row.win}</td>
          <td class="bad">${row.loss}</td>
          <td>${row.winRate}%</td>
        </tr>`).join('');

      document.getElementById('trades').innerHTML = (data.recentTrades || []).map(t => `
        <tr>
          <td>${new Date(t.createdAt).toLocaleString()}</td>
          <td>${t.grade}</td>
          <td>${t.model}</td>
          <td>${t.session}</td>
          <td>${t.entry}</td>
          <td>${t.SL}</td>
          <td>${t.TP1}</td>
          <td>${t.TP2}</td>
          <td>${t.result}</td>
          <td>${t.score}</td>
          <td>${t.confidence}</td>
        </tr>`).join('');
    }
    load().catch(err => alert(err.message));
  </script>
</body>
</html>
