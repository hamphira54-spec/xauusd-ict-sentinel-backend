<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XAUUSD ICT Sentinel Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0b1020; color: #e7ecff; }
    .wrap { padding: 24px; max-width: 1240px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .card { background: #111831; border-radius: 16px; padding: 18px; box-shadow: 0 8px 24px rgba(0,0,0,.25); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid #263356; text-align: left; vertical-align: top; }
    .section { margin-top: 24px; }
    .ok { color: #7ee787; }
    .bad { color: #ff7b72; }
    .muted { color: #9fb0d1; }
    code { color: #9bdcff; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>XAUUSD ICT Sentinel v2 Dashboard</h1>
    <div class="grid" id="summary"></div>

    <div class="section card">
      <h2>Model Performance</h2>
      <table><thead><tr><th>Model</th><th>Total</th><th>Win</th><th>Loss</th><th>Pending</th><th>Win Rate</th><th>Avg Score</th><th>Avg Confidence</th></tr></thead><tbody id="models"></tbody></table>
    </div>

    <div class="section card">
      <h2>Session Performance</h2>
      <table><thead><tr><th>Session</th><th>Total</th><th>Win</th><th>Loss</th><th>Win Rate</th></tr></thead><tbody id="sessions"></tbody></table>
    </div>

    <div class="section card">
      <h2>Trade History</h2>
      <table><thead><tr><th>Time</th><th>Grade</th><th>Side</th><th>Model</th><th>Session</th><th>Entry</th><th>SL/TP1</th><th>Result</th><th>Score</th></tr></thead><tbody id="history"></tbody></table>
    </div>
  </div>
  <script>
    async function load() {
      const res = await fetch('/api/performance');
      const data = await res.json();
      const summary = document.getElementById('summary');
      const cards = [
        ['Total Trades', data.totalTrades],
        ['Resolved Trades', data.resolvedTrades],
        ['Wins', data.wins],
        ['Losses', data.losses],
        ['Pending', data.pending],
        ['Win Rate', `${data.winRate}%`]
      ];
      summary.innerHTML = cards.map(([k,v]) => `<div class="card"><div class="muted">${k}</div><div style="font-size:28px;font-weight:bold;margin-top:8px">${v}</div></div>`).join('');
      document.getElementById('models').innerHTML = data.modelPerformance.map(m => `<tr><td>${m.model}</td><td>${m.total}</td><td class="ok">${m.win}</td><td class="bad">${m.loss}</td><td>${m.pending}</td><td>${m.winRate}%</td><td>${m.avgScore}</td><td>${m.avgConfidence}</td></tr>`).join('');
      document.getElementById('sessions').innerHTML = data.sessionPerformance.map(s => `<tr><td>${s.session}</td><td>${s.total}</td><td class="ok">${s.win}</td><td class="bad">${s.loss}</td><td>${s.winRate}%</td></tr>`).join('');
      document.getElementById('history').innerHTML = data.recentTrades.map(t => `<tr><td>${new Date(t.createdAt).toLocaleString()}</td><td>${t.grade}</td><td>${t.side}</td><td>${t.model}</td><td>${t.session}</td><td>${(t.entry || []).join(' - ')}</td><td>${t.sl} / ${t.tp1}</td><td>${t.result}</td><td>${t.score}</td></tr>`).join('');
    }
    load();
  </script>
</body>
</html>
