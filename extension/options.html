<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>XAUUSD ICT Sentinel Settings</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; background: #0b1020; color: #fff; }
    label { display: block; margin: 12px 0 6px; }
    input[type="text"], input[type="number"] { width: 100%; max-width: 600px; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #111827; color: #fff; }
    .row { margin: 10px 0; }
    button { margin-top: 16px; padding: 10px 16px; border: 0; border-radius: 10px; background: #2563eb; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <h1>XAUUSD ICT Sentinel Settings</h1>
  <label>Backend API Base URL</label>
  <input id="apiBaseUrl" type="text" placeholder="https://your-app.railway.app" />

  <label>Extension API Key</label>
  <input id="apiKey" type="text" placeholder="EXTENSION_API_KEY" />

  <div class="row"><label><input id="autoScan" type="checkbox" /> Auto scan every 15+ minutes</label></div>
  <label>Auto Scan Minutes</label>
  <input id="autoScanMinutes" type="number" min="15" step="1" />

  <div class="row"><label><input id="sessionFilter" type="checkbox" /> Session filter on</label></div>
  <button id="save">Save</button>
  <p id="status"></p>

  <script>
    chrome.runtime.sendMessage({ type: 'GET_SETTINGS' }, settings => {
      document.getElementById('apiBaseUrl').value = settings.apiBaseUrl || '';
      document.getElementById('apiKey').value = settings.apiKey || '';
      document.getElementById('autoScan').checked = !!settings.autoScan;
      document.getElementById('autoScanMinutes').value = settings.autoScanMinutes || 15;
      document.getElementById('sessionFilter').checked = !!settings.sessionFilter;
    });

    document.getElementById('save').addEventListener('click', () => {
      const settings = {
        apiBaseUrl: document.getElementById('apiBaseUrl').value.trim(),
        apiKey: document.getElementById('apiKey').value.trim(),
        autoScan: document.getElementById('autoScan').checked,
        autoScanMinutes: Number(document.getElementById('autoScanMinutes').value || 15),
        sessionFilter: document.getElementById('sessionFilter').checked
      };
      chrome.runtime.sendMessage({ type: 'SAVE_SETTINGS', settings }, () => {
        document.getElementById('status').textContent = 'Saved.';
      });
    });
  </script>
</body>
</html>
